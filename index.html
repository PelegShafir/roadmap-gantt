<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupang Project Tracker</title>
<style>
  :root{
    --panel:#ffffff;
    --ink:#1e293b;
    --muted:#64748b;
    --line:#e8ecf3;
    --line-strong:#d4dae6;
    --today:#ef4444;
    --setup:#64748b;
    --hvhr:#6366f1;
    --pqv:#0ea5e9;
    --ism:#10b981;
    --shrink:#f59e0b;
    --dwell:#ec4899;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1729 0%,#1e293b 100%);
    color:var(--ink);
    padding:40px 20px;
    min-height:100vh;
  }
  .card{
    max-width:1180px;margin:0 auto;background:var(--panel);
    border-radius:18px;box-shadow:0 24px 60px rgba(0,0,0,.35);overflow:hidden;
  }
  header{padding:30px 38px 24px;border-bottom:1px solid var(--line)}
  .titlebar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
  h1{font-size:25px;font-weight:700;letter-spacing:-.4px}
  .sub{color:var(--muted);font-size:14px;margin-top:6px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  button{
    font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;
    border:1px solid var(--line-strong);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:9px;transition:all .12s ease;
  }
  button:hover{background:#f4f6fb;border-color:#b9c2d4}
  button.primary{background:#6366f1;color:#fff;border-color:#6366f1}
  button.primary:hover{background:#5457e0}
  button.danger:hover{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
  .legend{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:18px}
  .legend span{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);font-weight:500}
  .dot{width:12px;height:12px;border-radius:4px;display:inline-block}

  .chart{padding:14px 38px 30px;overflow-x:auto}
  .grid{position:relative;min-width:920px}
  .months{display:grid;margin-left:var(--labelw);border-bottom:2px solid var(--line-strong);position:relative}
  .months .m{text-align:center;font-size:11.5px;font-weight:600;color:var(--muted);padding:8px 0 10px;border-left:1px solid var(--line);text-transform:uppercase;letter-spacing:.5px}
  .months .m .yr{display:block;font-size:9.5px;color:#9aa6b8;font-weight:500;letter-spacing:.3px}
  .rows{position:relative}
  .vlines{position:absolute;top:0;bottom:0;left:var(--labelw);right:0;pointer-events:none}
  .vlines .vl{position:absolute;top:0;bottom:0;width:1px;background:var(--line)}
  .row{display:flex;align-items:center;height:48px;position:relative;z-index:1}
  .row:nth-child(even){background:#fafbfd}
  .row .label{width:var(--labelw);flex:0 0 var(--labelw);font-size:13px;font-weight:600;padding-right:16px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track{position:relative;flex:1;height:100%}
  .bar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:7px;display:flex;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.12);transition:transform .12s ease;cursor:pointer}
  .bar:hover{transform:translateY(-50%) scale(1.012);z-index:5}
  .bar .txt{font-size:11px;font-weight:600;color:#fff;padding:0 9px;white-space:nowrap;text-shadow:0 1px 1px rgba(0,0,0,.18)}
  .bar.beta{background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.16) 0 7px,transparent 7px 14px);background-blend-mode:overlay}
  /* phase-gate diamond at bar end (hollow) */
  .ms{position:absolute;top:50%;width:11px;height:11px;transform:translate(-50%,-50%) rotate(45deg);background:#fff;border:2px solid var(--ink);z-index:4}
  /* user milestone marker on the bar (filled) */
  .mmark{position:absolute;top:50%;width:11px;height:11px;transform:translate(-50%,-50%) rotate(45deg);background:#1e293b;border:2px solid #fff;z-index:8;cursor:help;box-shadow:0 1px 3px rgba(0,0,0,.35)}
  .mlabel{position:absolute;bottom:calc(50% + 15px);transform:translateX(-50%);font-size:9px;font-weight:700;color:#334155;white-space:nowrap;background:rgba(255,255,255,.92);padding:1px 5px;border-radius:5px;z-index:8;pointer-events:none;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .today{position:absolute;top:-4px;bottom:0;width:2px;background:var(--today);z-index:6}
  .today::before{content:"TODAY";position:absolute;top:-2px;left:50%;transform:translateX(-50%);background:var(--today);color:#fff;font-size:8.5px;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.5px;white-space:nowrap}

  /* editor table */
  .editor{padding:6px 38px 30px;border-top:1px solid var(--line)}
  .editor h2{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .editor h2 .hint{font-size:11.5px;font-weight:500;color:var(--muted)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:4px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  td input,td select{font-family:inherit;font-size:12.5px;border:1px solid transparent;background:transparent;color:var(--ink);padding:5px 6px;border-radius:6px;width:100%}
  td input:focus,td select:focus{outline:none;border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  td input[type=date]{min-width:130px}
  td.lbl input{font-weight:600}
  td.act{width:34px;text-align:center}
  .iconbtn{border:none;background:transparent;color:#cbd3e0;font-size:16px;line-height:1;padding:4px 6px;cursor:pointer;border-radius:6px}
  .iconbtn:hover{background:#fef2f2;color:#dc2626}
  .swatch{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:5px}
  .msbtn{border:1px solid var(--line-strong);background:#fff;color:#475569;font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;white-space:nowrap}
  .msbtn:hover{background:#f4f6fb}
  .msbtn .cnt{display:inline-block;min-width:15px;height:15px;line-height:15px;text-align:center;background:#1e293b;color:#fff;border-radius:8px;font-size:9px;margin-left:5px;padding:0 3px}
  /* milestone sub-editor */
  .msrow td{background:#f8fafc;padding:10px 14px 12px 40px}
  .mstitle{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
  .msline{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .msline .di{flex:0 0 150px}
  .msline .ti{flex:1}
  .msline input{border:1px solid var(--line-strong)!important;background:#fff!important;padding:6px 8px;border-radius:7px}
  .msline input:focus{border-color:#6366f1!important}
  .msempty{font-size:12px;color:#94a3b8;margin-bottom:8px}

  footer{padding:18px 38px 26px;border-top:1px solid var(--line);color:var(--muted);font-size:11.5px;line-height:1.6}
  footer b{color:var(--ink)}
  .saved{font-size:11.5px;color:#10b981;font-weight:600;opacity:0;transition:opacity .3s}
  .saved.show{opacity:1}

  @media print{
    body{background:#fff;padding:0}
    .card{box-shadow:none;border-radius:0;max-width:100%}
    .toolbar,.editor{display:none}
    .bar:hover{transform:translateY(-50%)}
  }
</style>
</head>
<body>
<div class="card">
  <header>
    <div class="titlebar">
      <div>
        <h1>Coupang Project Tracker</h1>
      </div>
      <div class="toolbar">
        <span class="saved" id="saved">Saved &#10003;</span>
        <button onclick="window.print()">Print / PDF</button>
        <button onclick="exportJSON()">Export</button>
        <button onclick="document.getElementById('imp').click()">Import</button>
        <input type="file" id="imp" accept=".json" style="display:none" onchange="importJSON(event)">
        <button class="danger" onclick="resetData()">Reset</button>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </header>

  <div class="chart">
    <div class="grid" style="--labelw:190px">
      <div class="months" id="months"></div>
      <div class="rows" id="rows"><div class="vlines" id="vlines"></div></div>
    </div>
  </div>

  <div class="editor">
    <h2>Edit timeline <span class="hint">&mdash; type to edit; click &#9670; Milestones to add markers on a bar. Changes save automatically &amp; redraw above.</span></h2>
    <table>
      <thead>
        <tr><th>Item</th><th>Stream</th><th>Start</th><th>End</th><th>Milestones</th><th></th></tr>
      </thead>
      <tbody id="ebody"></tbody>
    </table>
    <button class="primary" style="margin-top:14px" onclick="addRow()">+ Add item</button>
  </div>

  <footer>
    <b>Milestone key:</b> T0 &mdash; Deliver 10 insights &nbsp;&middot;&nbsp; T1 &mdash; Beta launch &nbsp;&middot;&nbsp; T2 &mdash; GA launch
  </footer>
</div>

<script>
const STREAMS = {
  setup:{name:"Setup",color:cssVar('--setup')},
  hvhr:{name:"HVHR",color:cssVar('--hvhr')},
  pqv:{name:"PQV",color:cssVar('--pqv')},
  ism:{name:"ISM",color:cssVar('--ism')},
  shrink:{name:"Shrink Hotspots",color:cssVar('--shrink')},
  dwell:{name:"Dwell Time",color:cssVar('--dwell')},
};
function cssVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

const DEFAULTS = [
  {label:"Basic configuration", stream:"setup", phase:"pilot", start:"2026-06-11", end:"2026-06-23", milestones:[]},
  {label:"Users training",      stream:"setup", phase:"pilot", start:"2026-06-25", end:"2026-06-25", milestones:[]},
  {label:"HVHR",   stream:"hvhr",   phase:"beta", start:"2026-06-25", end:"2026-09-01", milestones:[{date:"2026-06-25",label:"T0"},{date:"2026-07-01",label:"T1"},{date:"2026-09-01",label:"T2"}]},
  {label:"PQV",    stream:"pqv",    phase:"beta", start:"2026-08-01", end:"2026-10-01", milestones:[{date:"2026-08-01",label:"T0"},{date:"2026-08-06",label:"T1"},{date:"2026-10-01",label:"T2"}]},
  {label:"ISM",    stream:"ism",    phase:"beta", start:"2026-09-01", end:"2026-11-01", milestones:[{date:"2026-09-01",label:"T0"},{date:"2026-09-08",label:"T1"},{date:"2026-11-01",label:"T2"}]},
  {label:"Shrink Hotspots", stream:"shrink", phase:"beta", start:"2026-10-01", end:"2026-12-01", milestones:[{date:"2026-10-01",label:"T0"},{date:"2026-10-08",label:"T1"},{date:"2026-12-01",label:"T2"}]},
  {label:"Dwell Time", stream:"dwell", phase:"beta", start:"2026-11-01", end:"2027-01-01", milestones:[{date:"2026-11-01",label:"T0"},{date:"2026-11-08",label:"T1"},{date:"2027-01-01",label:"T2"}]},
];
const TODAY = "2026-06-16";
const KEY = "roadmapGantt.v2";

let TASKS = load();
const openMs = new Set();   // editor rows with milestone panel expanded


function load(){
  // read current key, fall back to older key so saved data survives version bumps
  for(const k of [KEY,"roadmapGantt.v1"]){
    try{const s=localStorage.getItem(k);if(s){const d=JSON.parse(s);d.forEach(t=>{if(!t.milestones)t.milestones=[];});return d;}}catch(e){}
  }
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(TASKS));flashSaved();}catch(e){}
}
function flashSaved(){const s=document.getElementById('saved');s.classList.add('show');clearTimeout(s._t);s._t=setTimeout(()=>s.classList.remove('show'),1200);}

// ---- timeline (auto-fit to data, padded to month boundaries) -------
function bounds(){
  const ds=TASKS.flatMap(t=>[t.start,t.end]).filter(Boolean).map(d=>new Date(d));
  if(!ds.length){const n=new Date();return {T0:new Date(n.getFullYear(),n.getMonth(),1),T1:new Date(n.getFullYear(),n.getMonth()+6,1)};}
  let lo=new Date(Math.min(...ds)), hi=new Date(Math.max(...ds));
  const T0=new Date(lo.getFullYear(),lo.getMonth(),1);
  const T1=new Date(hi.getFullYear(),hi.getMonth()+1,1);
  return {T0,T1};
}
const MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function render(){
  const {T0,T1}=bounds();
  const SPAN=T1-T0;
  const pct=d=>((new Date(d)-T0)/SPAN)*100;

  const months=[];let c=new Date(T0);
  while(c<T1){months.push(new Date(c));c.setMonth(c.getMonth()+1);}
  const mEl=document.getElementById('months');mEl.innerHTML='';
  mEl.style.gridTemplateColumns=`repeat(${months.length},1fr)`;
  months.forEach(m=>{const d=document.createElement('div');d.className='m';
    d.innerHTML=`${MN[m.getMonth()]}<span class="yr">${m.getFullYear()}</span>`;mEl.appendChild(d);});

  const rowsEl=document.getElementById('rows');rowsEl.innerHTML='<div class="vlines" id="vlines"></div>';
  const vl=document.getElementById('vlines');
  months.forEach(m=>{const e=document.createElement('div');e.className='vl';e.style.left=pct(m)+'%';vl.appendChild(e);});

  TASKS.forEach((t,i)=>{
    const row=document.createElement('div');row.className='row';
    const lab=document.createElement('div');lab.className='label';lab.textContent=t.label||'(untitled)';
    const track=document.createElement('div');track.className='track';
    if(t.start&&t.end){
      const left=pct(t.start),right=pct(t.end);
      const bar=document.createElement('div');bar.className='bar '+(t.phase||'pilot');
      bar.style.left=left+'%';bar.style.width=Math.max(right-left,0.6)+'%';
      bar.style.background=(STREAMS[t.stream]||{}).color||'#94a3b8';
      const days=Math.round((new Date(t.end)-new Date(t.start))/864e5);
      bar.title=`${t.label}: ${fmt(t.start)} → ${fmt(t.end)} (${days}d)`;
      const txt=document.createElement('span');txt.className='txt';
      txt.textContent=t.stream==='setup'?'':(t.phase==='beta'?'Beta':'Pilot');
      bar.appendChild(txt);track.appendChild(bar);
      // phase gate diamond
      const ms=document.createElement('div');ms.className='ms';ms.style.left=right+'%';
      ms.style.borderColor=(STREAMS[t.stream]||{}).color||'#94a3b8';
      ms.title=t.phase==='beta'?'Gate: Announce GA — full deployment':'Gate: Announce beta & expand to GWJ2, ANS4, TOW5';
      track.appendChild(ms);
      // user milestones on the bar
      (t.milestones||[]).forEach(m=>{
        if(!m.date)return;
        const x=pct(m.date);
        const mk=document.createElement('div');mk.className='mmark';mk.style.left=x+'%';
        mk.title=(m.label?m.label+' — ':'')+fmt(m.date);
        track.appendChild(mk);
        if(m.label){const lb=document.createElement('div');lb.className='mlabel';lb.style.left=x+'%';lb.textContent=m.label;track.appendChild(lb);}
      });
    }
    row.appendChild(lab);row.appendChild(track);rowsEl.appendChild(row);
  });

  if(TODAY>=fmtISO(T0)&&TODAY<=fmtISO(T1)){
    const tline=document.createElement('div');tline.className='today';
    tline.style.left=`calc(190px + ${pct(TODAY)/100} * (100% - 190px))`;
    rowsEl.appendChild(tline);
  }

  const lg=document.getElementById('legend');lg.innerHTML='';
  Object.values(STREAMS).forEach(s=>{const el=document.createElement('span');
    el.innerHTML=`<span class="dot" style="background:${s.color}"></span>${s.name}`;lg.appendChild(el);});
  const ph=document.createElement('span');
  ph.innerHTML=`<span class="dot" style="background:#94a3b8;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.5) 0 4px,transparent 4px 8px)"></span>Beta (hatched)`;
  lg.appendChild(ph);
  const mi=document.createElement('span');
  mi.innerHTML=`<span class="dot" style="width:11px;height:11px;background:#1e293b;transform:rotate(45deg);border:2px solid #fff"></span>Milestone`;
  lg.appendChild(mi);
}

// ---- editor table --------------------------------------------------
function renderEditor(){
  const tb=document.getElementById('ebody');tb.innerHTML='';
  TASKS.forEach((t,i)=>{
    const tr=document.createElement('tr');
    const streamOpts=Object.entries(STREAMS).map(([k,v])=>
      `<option value="${k}" ${t.stream===k?'selected':''}>${v.name}</option>`).join('');
    const n=(t.milestones||[]).length;
    tr.innerHTML=`
      <td class="lbl"><input value="${esc(t.label)}" oninput="upd(${i},'label',this.value)"></td>
      <td><span class="swatch" style="background:${(STREAMS[t.stream]||{}).color||'#94a3b8'}"></span>
          <select onchange="upd(${i},'stream',this.value)" style="width:auto;display:inline-block">${streamOpts}</select></td>
      <td><input type="date" min="2010-01-01" max="2040-12-31" value="${t.start||''}" onchange="upd(${i},'start',this.value)"></td>
      <td><input type="date" min="2010-01-01" max="2040-12-31" value="${t.end||''}" onchange="upd(${i},'end',this.value)"></td>
      <td><button class="msbtn" onclick="toggleMs(${i})">&#9670; Milestones${n?`<span class="cnt">${n}</span>`:''}</button></td>
      <td class="act"><button class="iconbtn" title="Delete item" onclick="delRow(${i})">&times;</button></td>`;
    tb.appendChild(tr);

    if(openMs.has(i)){
      const sub=document.createElement('tr');sub.className='msrow';
      const td=document.createElement('td');td.colSpan=6;
      let html=`<div class="mstitle">Milestones on &ldquo;${esc(t.label)}&rdquo;</div>`;
      if(!n) html+=`<div class="msempty">No milestones yet. Add one below &mdash; it appears as a diamond on the bar at its date.</div>`;
      (t.milestones||[]).forEach((m,j)=>{
        html+=`<div class="msline">
          <input class="di" type="date" min="2010-01-01" max="2040-12-31" value="${m.date||''}" onchange="updMs(${i},${j},'date',this.value)">
          <input class="ti" type="text" placeholder="Milestone label (e.g. Security review)" value="${esc(m.label)}" oninput="updMs(${i},${j},'label',this.value)">
          <button class="iconbtn" title="Remove milestone" onclick="delMs(${i},${j})">&times;</button>
        </div>`;
      });
      html+=`<button class="msbtn" style="margin-top:4px" onclick="addMs(${i})">+ Add milestone</button>`;
      td.innerHTML=html;sub.appendChild(td);tb.appendChild(sub);
    }
  });
}

function clampDate(v){if(!v)return v;const y=+v.slice(0,4);if(y<2010)return '2010'+v.slice(4);if(y>2040)return '2040'+v.slice(4);return v;}
function upd(i,key,val){if(key==='start'||key==='end')val=clampDate(val);TASKS[i][key]=val;save();render();if(key==='start'||key==='end')renderEditor();}
function addRow(){TASKS.push({label:"New item",stream:"setup",phase:"pilot",start:"",end:"",milestones:[]});save();render();renderEditor();}
function delRow(i){TASKS.splice(i,1);openMs.delete(i);save();render();renderEditor();}

function toggleMs(i){if(openMs.has(i))openMs.delete(i);else openMs.add(i);renderEditor();}
function addMs(i){if(!TASKS[i].milestones)TASKS[i].milestones=[];TASKS[i].milestones.push({date:TASKS[i].start||"",label:""});openMs.add(i);save();render();renderEditor();}
function updMs(i,j,key,val){if(key==='date')val=clampDate(val);TASKS[i].milestones[j][key]=val;save();render();if(key==='date')renderEditor();}
function delMs(i,j){TASKS[i].milestones.splice(j,1);save();render();renderEditor();}

function resetData(){if(confirm("Reset to the original list? Your edits and milestones will be lost.")){TASKS=JSON.parse(JSON.stringify(DEFAULTS));openMs.clear();save();render();renderEditor();}}

function exportJSON(){
  const blob=new Blob([JSON.stringify(TASKS,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='roadmap-gantt.json';a.click();URL.revokeObjectURL(a.href);
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
    if(Array.isArray(d)){d.forEach(t=>{if(!t.milestones)t.milestones=[];});TASKS=d;openMs.clear();save();render();renderEditor();}else alert('Invalid file.');
  }catch(err){alert('Could not read file.');}};r.readAsText(f);e.target.value='';
}

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function fmt(d){const x=new Date(d);return `${x.getMonth()+1}/${x.getDate()}/${x.getFullYear()}`;}
function fmtISO(d){return d.toISOString().slice(0,10);}

render();renderEditor();
</script>
</body>
</html>
